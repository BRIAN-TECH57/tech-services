<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services | Brian Tech</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --navy: #1a2a6c; --gold: #fdbb2d; --bg: #f8f9fa; --text: #333; --card-bg: #fff; }
        [data-theme="dark"] { --bg: #121212; --text: #eee; --card-bg: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        nav { background: var(--navy); padding: 10px 30px; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index: 1000;}
        .nav-brand { display: flex; align-items: center; color: white; text-decoration: none; }
        .nav-brand img { height: 45px; width: 45px; border-radius: 50%; border: 2px solid var(--gold); margin-right: 15px; }
        .nav-links a { color: white; margin-left: 20px; text-decoration: none; font-weight: bold; }
        #theme-toggle { background: none; border: none; color: white; cursor: pointer; font-size: 1.2rem; margin-left: 20px; }
        header { background: var(--navy); color: white; padding: 50px; text-align: center; }
        .container { max-width: 900px; margin: auto; padding: 40px 20px; }
        .price-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(0,0,0,0.05); padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid rgba(0,0,0,0.1); }
        .order-btn { background: #25D366; color: white; padding: 8px 15px; border-radius: 5px; text-decoration: none; font-weight: bold; }
        .whatsapp-bubble { position: fixed; bottom: 30px; right: 30px; background: #25D366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; box-shadow: 0 4px 15px rgba(0,0,0,0.3); text-decoration: none; z-index: 1000; }
    </style>
</head>
<body>
<nav>
    <a href="index.html" class="nav-brand"><img src="business-1card.jpg"><span>BRIAN TECH</span></a>
    <div style="display:flex; align-items:center;">
        <div class="nav-links"><a href="index.html">Home</a><a href="services.html" style="color:var(--gold);">Services</a><a href="about.html">About</a></div>
        <button id="theme-toggle"><i class="fas fa-moon"></i></button>
    </div>
</nav>
<header><h1>Professional Services</h1></header>
<div class="container">
    <div class="price-card">
        <table>
            <tr><th>Task</th><th>Price</th><th>Action</th></tr>
            <tr><td>Logo Design</td><td>KSh 1,500</td><td><a href="https://wa.me/254706006446" class="order-btn">Order</a></td></tr>
            <tr><td>PC Maintenance</td><td>KSh 1,000</td><td><a href="https://wa.me/254706006446" class="order-btn">Book</a></td></tr>
        </table>
    </div>
</div>
<a href="https://wa.me/254706006446" class="whatsapp-bubble" target="_blank"><i class="fab fa-whatsapp"></i></a>
<script>
    const toggle = document.getElementById('theme-toggle');
    if (localStorage.getItem('theme') === 'dark') { document.documentElement.setAttribute('data-theme', 'dark'); toggle.innerHTML = '<i class="fas fa-sun"></i>'; }
    toggle.addEventListener('click', () => {
        let isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
        localStorage.setItem('theme', isDark ? 'light' : 'dark');
        toggle.innerHTML = isDark ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
    });
</script>
</body>
</html>
