<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Brian Tech</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --navy: #1a2a6c; --gold: #fdbb2d; --bg: #f8f9fa; --text: #333; --card: #fff; }
        [data-theme="dark"] { --bg: #0f0f13; --text: #eee; --card: #1e1e1e; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: var(--bg); color: var(--text); }
        nav { background: var(--navy); padding: 12px 30px; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index: 1000;}
        .nav-brand { display: flex; align-items: center; color: white; text-decoration: none; font-weight: bold; }
        .nav-brand img { height: 40px; border-radius: 50%; border: 2px solid var(--gold); margin-right: 10px; }
        header { background: linear-gradient(135deg, var(--navy), #b21f1f); color: white; padding: 60px 20px; text-align: center; }
        .container { max-width: 900px; margin: -30px auto 40px; padding: 0 20px; }
        .contact-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .contact-card { background: var(--card); padding: 40px 20px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-bottom: 4px solid var(--gold); transition: 0.3s; }
        .contact-card:hover { transform: translateY(-5px); }
        .contact-card i { font-size: 3rem; color: var(--gold); margin-bottom: 15px; }
        .contact-link { display: block; margin-top: 10px; color: var(--text); text-decoration: none; font-weight: bold; word-break: break-all; }
        #theme-toggle { background: none; border: 1px solid rgba(255,255,255,0.3); color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer; margin-left: 15px; }
    </style>
</head>
<body>
<nav>
    <a href="index.html" class="nav-brand"><img src="business-1card.jpg"> BRIAN TECH</a>
    <div style="display:flex; align-items:center;">
        <div class="nav-links"><a href="index.html">Home</a><a href="services.html">Services</a><a href="about.html">About</a><a href="contact.html" style="color:var(--gold)">Contact</a></div>
        <button id="theme-toggle"><i class="fas fa-moon"></i></button>
    </div>
</nav>

<header><h1>Direct Channels</h1><p>Reach out via any of the methods below.</p></header>

<div class="container">
    <div class="contact-grid">
        <div class="contact-card"><i class="fas fa-phone-alt"></i><h3>Phone</h3><a href="tel:+254706006446" class="contact-link">0706 006 446</a></div>
        <div class="contact-card"><i class="fas fa-envelope-open"></i><h3>Emails</h3><a href="mailto:bmuthomi57@gmail.com" class="contact-link">bmuthomi57@gmail.com</a><a href="mailto:muthomibrian329@gmail.com" class="contact-link">muthomibrian329@gmail.com</a></div>
        <div class="contact-card"><i class="fas fa-map-marker-alt"></i><h3>Location</h3><span class="contact-link">Mitunguu, Meru County</span></div>
    </div>
</div>

<script>
    const toggle = document.getElementById('theme-toggle');
    if (localStorage.getItem('theme') === 'dark') { document.documentElement.setAttribute('data-theme', 'dark'); toggle.innerHTML = '<i class="fas fa-sun"></i>'; }
    toggle.addEventListener('click', () => {
        let isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
        localStorage.setItem('theme', isDark ? 'light' : 'dark');
        toggle.innerHTML = isDark ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
    });
</script>
</body>
</html>
